<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Генератор откликов</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --md-primary: #6750A4;
  --md-on-primary: #FFFFFF;
  --md-primary-container: #EADDFF;
  --md-on-primary-container: #21005D;
  --md-secondary-container: #E8DEF8;
  --md-on-secondary-container: #1D192B;
  --md-surface: #FFFBFE;
  --md-surface-1: #F4EFF4;
  --md-surface-2: #EDE8F5;
  --md-surface-3: #E6DFEF;
  --md-on-surface: #1C1B1F;
  --md-on-surface-var: #49454F;
  --md-outline: #79747E;
  --md-outline-var: #CAC4D0;
  --md-error: #B3261E;
  --md-error-container: #F9DEDC;
  --md-on-error-container: #410E0B;
  --md-success: #386A20;
  --md-success-container: #B7F397;
  --md-font: 'Roboto', sans-serif;
  --md-ease: cubic-bezier(0.2,0,0,1);
  --md-shape-sm: 4px;
  --md-shape-md: 12px;
  --md-shape-lg: 16px;
  --md-shape-full: 50px;
  --z-sticky: 20;
}
[data-theme="dark"] {
  --md-primary: #D0BCFF;
  --md-on-primary: #381E72;
  --md-primary-container: #4F378B;
  --md-on-primary-container: #EADDFF;
  --md-secondary-container: #4A4458;
  --md-on-secondary-container: #E8DEF8;
  --md-surface: #1C1B1F;
  --md-surface-1: #26232A;
  --md-surface-2: #2B2830;
  --md-surface-3: #302D37;
  --md-on-surface: #E6E1E5;
  --md-on-surface-var: #CAC4D0;
  --md-outline: #938F99;
  --md-outline-var: #49454F;
  --md-error: #F2B8B5;
  --md-error-container: #8C1D18;
  --md-on-error-container: #F9DEDC;
  --md-success: #98D475;
  --md-success-container: #1F5103;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:var(--md-font); background:var(--md-surface); color:var(--md-on-surface); min-height:100vh; font-size:14px; line-height:1.5; transition:background .3s var(--md-ease),color .3s var(--md-ease); }

/* Top Bar */
.top-bar { position:sticky; top:0; z-index:var(--z-sticky); background:var(--md-surface-2); height:64px; display:flex; align-items:center; justify-content:space-between; padding:0 16px; box-shadow:0 1px 2px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.05); transition:background .3s var(--md-ease); }
.top-bar-title { font-size:22px; font-weight:400; color:var(--md-on-surface); display:flex; align-items:center; gap:12px; }
.top-bar-badge { font-size:11px; font-weight:500; letter-spacing:.08em; padding:3px 8px; border-radius:var(--md-shape-full); background:var(--md-primary-container); color:var(--md-on-primary-container); }
.icon-btn { width:48px; height:48px; border-radius:var(--md-shape-full); display:flex; align-items:center; justify-content:center; background:transparent; border:none; cursor:pointer; color:var(--md-on-surface-var); position:relative; overflow:hidden; }
.icon-btn::after { content:''; position:absolute; inset:0; background:var(--md-on-surface); opacity:0; border-radius:inherit; transition:opacity .2s; }
.icon-btn:hover::after { opacity:.08; }
.icon-btn:active::after { opacity:.12; }

/* Page */
.page { max-width:1040px; margin:0 auto; padding:24px 16px 80px; }

/* Card */
.card { background:var(--md-surface-1); border-radius:var(--md-shape-lg); padding:20px; margin-bottom:16px; transition:background .3s var(--md-ease); }
.card-label { font-size:12px; font-weight:500; letter-spacing:.06em; text-transform:uppercase; color:var(--md-on-surface-var); margin-bottom:12px; }

/* Textarea */
.textarea-wrap { position:relative; }
.textarea-label { position:absolute; left:16px; top:14px; font-size:16px; color:var(--md-on-surface-var); pointer-events:none; padding:0 4px; transition:all .15s var(--md-ease); background:transparent; }
.textarea { width:100%; padding:16px; border:1px solid var(--md-outline); border-radius:var(--md-shape-sm); background:transparent; font-family:var(--md-font); font-size:16px; color:var(--md-on-surface); outline:none; resize:vertical; line-height:1.6; transition:border-color .15s,border-width .1s; }
.textarea::placeholder { color:transparent; }
.textarea:focus { border:2px solid var(--md-primary); padding:15px; }
.textarea:focus~.textarea-label,
.textarea:not(:placeholder-shown)~.textarea-label { top:-10px; font-size:12px; color:var(--md-primary); background:var(--md-surface-1); }
.textarea:not(:focus):not(:placeholder-shown)~.textarea-label { color:var(--md-on-surface-var); }

/* Error */
.error-banner { display:none; align-items:center; gap:10px; background:var(--md-error-container); color:var(--md-on-error-container); border-radius:var(--md-shape-md); padding:12px 16px; font-size:14px; margin-bottom:16px; animation:fadeUp .2s var(--md-ease); }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* Actions */
.actions-bar { display:flex; align-items:center; gap:12px; margin-bottom:24px; flex-wrap:wrap; }
.fab { display:inline-flex; align-items:center; gap:12px; padding:0 20px; height:56px; background:var(--md-primary-container); color:var(--md-on-primary-container); border:none; border-radius:var(--md-shape-lg); font-family:var(--md-font); font-size:14px; font-weight:500; letter-spacing:.01em; cursor:pointer; position:relative; overflow:hidden; box-shadow:0 1px 2px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.05); transition:box-shadow .2s,transform .1s; }
.fab::after { content:''; position:absolute; inset:0; background:var(--md-on-primary-container); opacity:0; transition:opacity .2s; }
.fab:hover { box-shadow:0 2px 4px rgba(0,0,0,.1),0 4px 10px rgba(0,0,0,.08); }
.fab:hover::after { opacity:.08; }
.fab:active { transform:scale(.98); }
.fab:active::after { opacity:.12; }
.fab:disabled { opacity:.38; cursor:not-allowed; box-shadow:none; transform:none; }
.btn-text { display:inline-flex; align-items:center; gap:8px; padding:10px 12px; height:40px; background:transparent; border:none; border-radius:var(--md-shape-full); font-family:var(--md-font); font-size:14px; font-weight:500; letter-spacing:.01em; color:var(--md-primary); cursor:pointer; position:relative; overflow:hidden; }
.btn-text::after { content:''; position:absolute; inset:0; background:var(--md-primary); opacity:0; transition:opacity .2s; }
.btn-text:hover::after { opacity:.08; }
.status-txt { font-size:14px; color:var(--md-on-surface-var); display:flex; align-items:center; gap:8px; }
@keyframes spin { to{transform:rotate(360deg)} }
.spinner { width:18px; height:18px; border:2px solid var(--md-outline-var); border-top-color:var(--md-primary); border-radius:50%; animation:spin .8s linear infinite; display:none; flex-shrink:0; }

/* Results */
.results-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
@media(max-width:720px){ .results-grid{ grid-template-columns:1fr; } }

/* Result card */
.result-card { background:var(--md-surface-2); border-radius:var(--md-shape-lg); overflow:hidden; display:flex; flex-direction:column; transition:background .3s var(--md-ease); }
.result-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--md-outline-var); }
.result-title { display:flex; align-items:center; gap:12px; font-size:14px; font-weight:500; color:var(--md-on-surface); }
.result-chip { width:32px; height:32px; border-radius:var(--md-shape-full); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; }
.chip-cv { background:var(--md-primary-container); color:var(--md-on-primary-container); }
.chip-lt { background:var(--md-secondary-container); color:var(--md-on-secondary-container); }

/* Copy button */
.btn-tonal { display:none; align-items:center; gap:6px; padding:6px 14px; height:36px; background:var(--md-surface-3); color:var(--md-on-surface-var); border:none; border-radius:var(--md-shape-full); font-family:var(--md-font); font-size:12px; font-weight:500; cursor:pointer; position:relative; overflow:hidden; transition:background .15s; }
.btn-tonal::after { content:''; position:absolute; inset:0; background:var(--md-on-surface); opacity:0; transition:opacity .2s; }
.btn-tonal:hover::after { opacity:.08; }
.btn-tonal.copied { background:var(--md-success-container); color:var(--md-success); }

/* Skeleton */
@keyframes shimmer { 0%{background-position:-600px 0} 100%{background-position:600px 0} }
.skeleton { display:none; flex-direction:column; gap:9px; padding:16px; }
.sk { height:12px; border-radius:6px; background:linear-gradient(90deg,var(--md-surface-3) 25%,var(--md-surface-1) 50%,var(--md-surface-3) 75%); background-size:1200px 100%; animation:shimmer 1.6s infinite linear; }

/* Body */
.result-body { flex:1; background:var(--md-surface-2); }
.placeholder { min-height:200px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:var(--md-on-surface-var); padding:24px; }
.ph-icon { font-size:28px; opacity:.4; }
.ph-text { font-size:14px; text-align:center; }
.result-text { padding:16px; font-family:var(--md-font); font-size:13px; line-height:1.75; color:var(--md-on-surface); white-space:pre-wrap; word-break:break-word; }

/* ── Verdict block — отдельно от текста ── */
.verdict-block {
  display: none;
  flex-direction: column;
  border-top: 1px solid var(--md-outline-var);
  background: var(--md-surface-1);
  transition: background .3s var(--md-ease);
}

.verdict-top {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--md-outline-var);
}

.verdict-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 12px; border-radius: var(--md-shape-full);
  font-size: 12px; font-weight: 500;
}
.v-ok   { background: var(--md-success-container); color: var(--md-success); }
.v-fail { background: var(--md-error-container);   color: var(--md-error); }
.verdict-score-txt { font-size: 12px; color: var(--md-on-surface-var); }

.verdict-rows {
  padding: 10px 16px;
  display: flex; flex-direction: column; gap: 6px;
}

.verdict-row {
  display: flex; align-items: flex-start; gap: 10px;
  font-size: 13px; line-height: 1.5;
}

.verdict-ico { flex-shrink: 0; font-size: 14px; margin-top: 1px; }
.verdict-lbl { font-weight: 500; color: var(--md-on-surface); min-width: 110px; flex-shrink: 0; }
.verdict-val { color: var(--md-on-surface-var); }

/* reduced motion */
@media(prefers-reduced-motion:reduce){ *,*::before,*::after{ animation-duration:.01ms!important; transition-duration:.01ms!important; } }
</style>
</head>
<body>

<header class="top-bar">
  <div class="top-bar-title">
    Генератор откликов
    <span class="top-bar-badge">AI</span>
  </div>
  <button class="icon-btn" id="themeToggle" aria-label="Переключить тему">
    <svg id="iconSun" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <svg id="iconMoon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>

<main class="page">

  <div class="card">

      <textarea class="textarea" id="vacancy" rows="9" placeholder=" "></textarea>

        </button>

  </div>
</main>

<script>
const NOTION_RESUME_ID = '32b8f295-093f-817e-8301-ef5acc3af45f';
const NOTION_LETTER_ID = '32b8f295-093f-8155-ab67-d0d667e12fa8';
const CLAUDE_KEY = 'ВСТАВЬ_СЮДА_CLAUDE_API_KEY';
const NOTION_KEY = 'ВСТАВЬ_СЮДА_NOTION_API_KEY';
const store = { resume: '', letter: '' };

/* Проверяем что ключи содержат только ASCII */
function assertAscii(key, name) {
  if (!/^[\x00-\x7F]+$/.test(key)) {
    throw new Error(`${name} содержит не-ASCII символы. Проверь что ключ вставлен правильно.`);
  }
}

const saved = localStorage.getItem('theme') || 'light';
applyTheme(saved);

function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('iconSun').style.display  = t === 'dark' ? 'block' : 'none';
  document.getElementById('iconMoon').style.display = t === 'dark' ? 'none'  : 'block';
  localStorage.setItem('theme', t);
}
document.getElementById('themeToggle').addEventListener('click', () => {
  applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
});

function showErr(m) {
  document.getElementById('errText').textContent = m;
  document.getElementById('errBanner').style.display = 'flex';
}
function hideErr() { document.getElementById('errBanner').style.display = 'none'; }
function setStatus(t) { document.getElementById('statusTxt').textContent = t; }

function setLoading(on) {
  document.getElementById('genBtn').disabled = on;
  document.getElementById('spinner').style.display  = on ? 'block' : 'none';
  document.getElementById('playIco').style.display  = on ? 'none'  : 'block';
  document.getElementById('genLabel').textContent = on ? 'Генерирую...' : 'Сгенерировать';
}

function showSkel(id, on) {
  const sk = document.getElementById('sk' + id);
  const bd = document.getElementById('bd' + id);
  sk.style.display = on ? 'flex' : 'none';
  sk.style.flexDirection = 'column';
  bd.style.display = on ? 'none' : 'block';
}

async function getPrompt(pageId) {
  const r = await fetch(`https://api.notion.com/v1/blocks/${pageId}/children?page_size=100`, {
    headers: {
      'Authorization': 'Bearer ' + NOTION_KEY,
      'Notion-Version': '2022-06-28',
      'Content-Type': 'application/json'
    }
  });
  if (!r.ok) throw new Error('Notion: ошибка ' + r.status);
  const d = await r.json();
  return d.results.map(b => {
    const t = b.type;
    return (b[t]?.rich_text || []).map(x => x.plain_text).join('');
  }).filter(Boolean).join('\n').trim();
}

async function askClaude(system, user) {
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': CLAUDE_KEY, 'anthropic-version': '2023-06-01' },
    body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 4000, system, messages: [{ role: 'user', content: user }] })
  });
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.error?.message || 'Claude: ' + r.status); }
  return (await r.json()).content[0].text;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ─── Парсим и показываем блок проверки отдельно от текста ─── */
function extractAndRenderVerdict(sfx, rawText) {
  /* Вырезаем блок проверки из текста */
  const sepPatterns = [
    /[-─━=]{3,}\s*\n\s*(ПРОВЕРКА|СПИСОК ИЗМЕНЕНИЙ|ИЗМЕНЕНИЯ)[^\n]*/i,
    /ПРОВЕРКА НА ГАЛЛЮЦИНАЦИИ/i,
    /━+\s*ПРОВЕРКА\s*━+/i,
    /━+\s*ИЗМЕНЕНИЯ/i,
    /СПИСОК ИЗМЕНЕНИЙ/i,
  ];

  let cleanText = rawText;
  let verdictRaw = '';

  /* Ищем с какого места начинается блок проверки */
  const checkMarker = rawText.search(/\n[-─━=]{3,}\s*\n|\nСПИСОК ИЗМЕНЕНИЙ|\nПРОВЕРКА/i);
  if (checkMarker !== -1) {
    cleanText  = rawText.slice(0, checkMarker).trim();
    verdictRaw = rawText.slice(checkMarker).trim();
  } else {
    /* Если нет явного разделителя — ищем строки с ключевыми словами проверки */
    const lines = rawText.split('\n');
    const splitIdx = lines.findIndex(l =>
      /^(ПРОВЕРКА|СПИСОК ИЗМЕНЕНИЙ|━+\s*ПРОВЕРКА|━+\s*ИЗМЕНЕНИЯ)/i.test(l.trim())
    );
    if (splitIdx !== -1) {
      cleanText  = lines.slice(0, splitIdx).join('\n').trim();
      verdictRaw = lines.slice(splitIdx).join('\n').trim();
    }
  }

  /* Показываем чистый текст */
  document.getElementById('bd' + sfx).innerHTML =
    `<pre class="result-text">${esc(cleanText)}</pre>`;

  /* Парсим данные проверки */
  const score  = (verdictRaw.match(/(\d+)%/) || [])[1];
  const passed = /PASSED/i.test(verdictRaw) && !/FAILED/i.test(verdictRaw);

  /* Галлюцинации */
  const hallLine = verdictRaw.match(/[Гг]аллюцинации[:\s]+([^\n]+)/);
  const hallVal  = hallLine ? hallLine[1].trim() : 'не обнаружено';

  /* Задачи из вакансии — ищем строки с → */
  const taskLines = verdictRaw.match(/[•\-*]\s*[^\n]+→[^\n]+/g) || [];
  const tasks = taskLines.map(l => l.replace(/^[•\-*]\s*/, '').trim());

  /* Рендерим verdict-block */
  const vb = document.getElementById('vb' + sfx);

  document.getElementById('vchip' + sfx).innerHTML = passed
    ? '<span class="verdict-chip v-ok">✓ PASSED</span>'
    : '<span class="verdict-chip v-fail">✗ FAILED</span>';

  document.getElementById('vscore' + sfx).textContent =
    score ? 'Оценка: ' + score + '%' : '';

  const rows = document.getElementById('vrows' + sfx);
  rows.innerHTML = '';

  /* Строка: галлюцинации */
  rows.innerHTML += `
    <div class="verdict-row">
      <span class="verdict-ico">${passed ? '✅' : '⚠️'}</span>
      <span class="verdict-lbl">Галлюцинации:</span>
      <span class="verdict-val">${esc(hallVal)}</span>
    </div>`;

  /* Строки: задачи */
  if (tasks.length > 0) {
    tasks.forEach(t => {
      rows.innerHTML += `
        <div class="verdict-row">
          <span class="verdict-ico">✅</span>
          <span class="verdict-val">${esc(t)}</span>
        </div>`;
    });
  }

  vb.style.display = 'flex';
  vb.style.flexDirection = 'column';
}

async function generate() {
  const vacancy = document.getElementById('vacancy').value.trim();

  hideErr();
  if (!vacancy) return showErr('Вставь текст вакансии');

  try { assertAscii(CLAUDE_KEY, 'Claude API ключ'); assertAscii(NOTION_KEY, 'Notion API ключ'); }
  catch(e) { return showErr(e.message); }

  setLoading(true);
  ['R','L'].forEach(s => {
    showSkel(s, true);
    document.getElementById('cp' + s).style.display = 'none';
    document.getElementById('vb' + s).style.display = 'none';
  });

  try {
    setStatus('Загружаю промпты из Notion...');
    const [rp, lp] = await Promise.all([
      getPrompt(NOTION_RESUME_ID),
      getPrompt(NOTION_LETTER_ID)
    ]);

    setStatus('Генерирую...');
    const msg = 'Вакансия:\n\n' + vacancy;
    const [rt, lt] = await Promise.all([
      askClaude(rp, msg),
      askClaude(lp, msg)
    ]);

    store.resume = rt;
    store.letter = lt;

    ['R','L'].forEach(s => showSkel(s, false));
    extractAndRenderVerdict('R', rt);
    extractAndRenderVerdict('L', lt);
    document.getElementById('cpR').style.display = 'inline-flex';
    document.getElementById('cpL').style.display = 'inline-flex';

    setStatus('Готово');
    setTimeout(() => setStatus(''), 2000);

  } catch (e) {
    showErr(e.message);
    ['R','L'].forEach(s => {
      showSkel(s, false);
      document.getElementById('bd' + s).innerHTML =
        '<div class="placeholder"><div class="ph-text">Ошибка генерации</div></div>';
    });
  } finally {
    setLoading(false);
  }
}

function copyResult(type, btnId) {
  const text = store[type];
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(btnId);
    const orig = btn.innerHTML;
    btn.classList.add('copied');
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Скопировано';
    setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = orig; }, 2000);
  });
}

function resetAll() {
  document.getElementById('vacancy').value = '';
  store.resume = ''; store.letter = '';
  hideErr(); setStatus('');
  const ph = { R: { ico:'📄', txt:'Резюме появится здесь' }, L: { ico:'✉️', txt:'Письмо появится здесь' } };
  ['R','L'].forEach(s => {
    showSkel(s, false);
    document.getElementById('bd' + s).innerHTML =
      `<div class="placeholder"><div class="ph-icon">${ph[s].ico}</div><div class="ph-text">${ph[s].txt}</div></div>`;
    document.getElementById('cp' + s).style.display = 'none';
    document.getElementById('vb' + s).style.display = 'none';
  });
}

document.getElementById('vacancy').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') generate();
});
</script>
